name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # -e обязателен: обычная установка уводит app/__file__ в site-packages,
      # и дефолтный SEED_PATH (backend/../shared) перестаёт существовать
      - run: pip install -e "./backend[dev]" ruff
      - run: ruff check backend bot
      - run: pytest backend/tests -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit -p tsconfig.app.json
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t atrice-landing .
      - run: docker build -t atrice-bot ./bot
