services:
  app:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    volumes:
      - ./data:/srv/data
    restart: unless-stopped

  bot:
    build: ./bot
    env_file: .env
    environment:
      BACKEND_URL: http://app:8000
    depends_on:
      - app
    restart: unless-stopped
